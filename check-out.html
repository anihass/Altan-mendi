<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Altan Mandi</title>
  <link rel="stylesheet" href="styles/navigation-bar.css">
  <link rel="stylesheet" href="styles/check-out.css">   <!-- Nechw file -->
</head>
<body >

   <div class="navbar js-navbar">  
  </div>

  <main class="checkout-container">
    <div class="checkout-content">

      <!-- LEFT SIDE: List of Ordered Products -->
      <section class="order-items-section">
        <h2 class="section-title">Your Order</h2>
        
        <div class="order-items js-order-items" id="order-items">

          <!-- Example Product (using your previous food-card style) -->
          <div class="food-card checkout-card">
            <div class="food-image">
              <img src="images/menu-page-images/chiken-mendi/chiken-mendi-with-rice.jpg" 
                   alt="Chicken Mendi">
            </div>
            <div class="food-info">
              <h3 class="food-name">Chicken Mendi</h3>
              <p class="food-description">Fragrant basmati rice with tender chicken, slow-cooked with spices.</p>
              <div class="food-price-qty">
                <span class="food-price">$8.99</span>
                <span class="quantity">× 2</span>
              </div>
            </div>
          </div>

          <!-- You can add more items here or dynamically with JS -->
          
        </div>
      </section>

      <!-- RIGHT SIDE: Success / Confirmation Box -->
      <aside class="confirmation-section">
        <div class="js-confirmation-box"></div>
        
      </aside>

    </div>
  </main>
<script src="script/check-out.js" type="module"></script>
</body>
</html>
