<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/navigation-bar.css">
    <link rel="stylesheet" href="styles/order.css">
    <title>Document</title>
</head>
<body>
    
<div class="navbar">
    <div class="nav-container">
      
      <!-- Logo - Moved more to the left -->
      <div class="logo">
        <img src="images/main-page-images/Altan-mendi-logo.jpg" alt="Altan Mendi Logo" class="logo-img">
        <div class="logo-text">
          <span class="altan">Altan</span>
          <span class="mendi">Mendi</span>
        </div>
      </div>

      <!-- Search Bar - In the middle -->
      <div class="search-container">
        <input type="text" id="search-input" class="search-bar" placeholder="Search menu (e.g. Chicken Mendi, Beef...)">
        <button class="search-btn">
          🔍
        </button>
      </div>

      <!-- Menu Links -->
      <div class="nav-links">
        <a href="altan-main.html" class="nav-link ">Home</a>
        <a href="menu.html" class="nav-link ">Menu</a>
        <a href="order.html" class="nav-link highlight">Order Now</a>
        <a href="/about" class="nav-link">About Us</a>
        <a href="check-out.html" class="nav-link">Check out</a>
      </div>

      <!-- Right Side -->
      <div class="nav-right">
        <!-- Cart Icon with Number -->
        <a href="/cart" class="cart-link" title="View Cart">
          <svg xmlns="http://www.w3.org/2000/svg" class="cart-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round" 
                  d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          <span id="cart-count" class="cart-count">0</span>
        </a>

        <!-- Theme Toggle -->
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
          <span id="theme-icon">☀️</span>
        </button>
      </div>
    </div>
  </div>
  <!-- Header (you already completed this) -->
  <!-- Paste your completed header here --> 
</div>
<main class="order-container">
    <div class="order-content">

        <!-- LEFT SIDE: Cart Items -->
        <section class="cart-section">
            <h2 class="section-title">Your Order</h2>
            
            <div class="cart-items" id="cart-items">

                <!-- Your Sample Food Card placed here -->
                <div class="food-card">
                    <div class="food-image">
                        <img src="images/menu-page-images/chiken-mendi/chiken-mendi-with-rice.jpg" 
                             alt="Chicken Mendi">
                    </div>
                    <div class="food-info">
                        <h3 class="food-name" id="chiken">Chicken Mendi</h3>
                        <p class="food-description">Fragrant basmati rice with tender chicken, slow-cooked with spices.</p>
                        <div class="food-price-add">
                            <span class="food-price">$8.99</span>
                            <button class="add-to-cart-btn">
                                <span>Delete</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- More cart items will be added here dynamically by JavaScript later -->

            </div>
        </section>

        <!-- RIGHT SIDE: Order Summary (unchanged) -->
        <aside class="summary-section">
            <div class="summary-box">
                <h3>Order Summary</h3>
                
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">$0.00</span>
                </div>
                
                <div class="summary-row">
                    <span>Delivery Fee</span>
                    <span id="delivery-fee">$4.99</span>
                </div>
                
                <div class="summary-row">
                    <span>Tax (15%)</span>
                    <span id="tax">$0.00</span>
                </div>
                
                <hr class="summary-divider">
                
                <div class="summary-row total-row">
                    <span>Total</span>
                    <span id="total">$0.00</span>
                </div>

                <button class="btn btn-primary calculate-btn" id="calculate-btn">
                    Calculate & Proceed to Checkout
                </button>
            </div>
        </aside>

    </div>
</main>

</body>
</html>
