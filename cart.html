<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Altan Mandi</title>
  <link rel="stylesheet" href="styles/navigation-bar.css">
  <link rel="stylesheet" href="styles/cart.css"> 
  <link rel="stylesheet" href="styles/cart.css">
</head>
<body>

  <!-- Navbar (same as your checkout) -->
  <div class="navbar js-navbar">
    
  </div>

  <main class="cart-container">
    <div class="cart-content">

      <!-- LEFT SIDE: Cart Items -->
      <section class="cart-items-section">
        <h2 class="section-title">Your Cart</h2>
        
        <div class="cart-items js-cart-items">
          <!-- Items will be populated by JavaScript -->
        </div>

      </section>

      <!-- RIGHT SIDE: Order Summary -->
      <aside class="cart-summary-section">
        <div class="summary-box">
          <h3 class="summary-title">Order your food!</h3>
          <a href="order.html">
            <button class="btn btn-order-now" id="proceed-to-checkout">
            Order Now
          </button>
          </a>
        </div>
      </aside>
    </div>
  </main>
  <script src="script/cart-page.js" type="module"></script> 
</body>
</html>
