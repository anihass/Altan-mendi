<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - Altan Mandi</title>
  <link rel="stylesheet" href="styles/navigation-bar.css">
  <link rel="stylesheet" href="styles/cart.css"> 
  <link rel="stylesheet" href="styles/cart.css">
</head>
<body>

  <!-- Navbar (same as your checkout) -->
  <div class="navbar">
    <div class="nav-container">
      <!-- Logo -->
      <div class="logo">
        <img src="images/main-page-images/Altan-mendi-logo.jpg" alt="Altan Mendi Logo" class="logo-img">
        <div class="logo-text">
          <span class="altan">Altan</span>
          <span class="mendi">Mendi</span>
        </div>
      </div>

      <!-- Search Bar -->
      <div class="search-container">
        <input type="text" id="search-input" class="search-bar" placeholder="Search menu (e.g. Chicken Mendi, Beef...)">
        <button class="search-btn">🔍</button>
      </div>

      <!-- Menu Links -->
      <div class="nav-links">
        <a href="altan-main.html" class="nav-link">Home</a>
        <a href="menu.html" class="nav-link">Menu</a>
        <a href="order.html" class="nav-link highlight">Order Now</a>
        <a href="about-us.html" class="nav-link">About Us</a>
        <a href="check-out.html" class="nav-link">Check out</a>
      </div>

      <!-- Right Side -->
      <div class="nav-right">
        <a href="cart.html" class="cart-link" title="View Cart">
          <svg xmlns="http://www.w3.org/2000/svg" class="cart-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
          </svg>
          <span id="cart-count" class="cart-count">0</span>
        </a>

        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
          <span id="theme-icon">☀️</span>
        </button>

        <button id="mobile-menu-btn" class="mobile-menu-btn">☰</button>
      </div>
    </div>
  </div>

  <main class="cart-container">
    <div class="cart-content">

      <!-- LEFT SIDE: Cart Items -->
      <section class="cart-items-section">
        <h2 class="section-title">Your Cart</h2>
        
        <div class="cart-items js-cart-items">
          <!-- Items will be populated by JavaScript -->
        </div>

      </section>

      <!-- RIGHT SIDE: Order Summary -->
      <aside class="cart-summary-section">
        <div class="summary-box">
          <h3 class="summary-title">Order Summary</h3>
          
          <div class="summary-details">
            <div class="summary-row">
              <span>Subtotal</span>
              <span id="subtotal">$0.00</span>
            </div>
            <div class="summary-row">
              <span>Delivery Fee</span>
              <span id="delivery-fee">$3.99</span>
            </div>
            <div class="summary-row total-row">
              <span>Total</span>
              <span id="total-amount">$0.00</span>
            </div>
          </div>

          <button class="btn btn-checkout" id="proceed-to-checkout">
            Proceed to Checkout
          </button>

          <button class="btn btn-clear" id="clear-cart-btn">
            Clear Cart
          </button>
        </div>
      </aside>
    </div>
  </main>
  <script src="script/cart-page.js" type="module"></script> 
</body>
</html>
